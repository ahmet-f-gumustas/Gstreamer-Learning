# GStreamer Video Analytics Pipeline Configuration File

pipeline:
  # Video input settings
  input:
    type: "file"              # file, webcam, rtsp, http
    location: "assets/test_video.mp4"

  # Video format settings
  video:
    width: 1920
    height: 1080
    framerate: 30
    format: "I420"            # Video pixel format

  # Processing settings
  processing:
    motion_detection: true    # Motion detection
    gpu_acceleration: false   # GPU acceleration

    # Video filters
    filters:
      brightness: 0.0         # -100 to 100
      contrast: 1.0           # 0.5 to 3.0
      saturation: 1.0         # 0.0 to 2.0

    # Motion detection parameters
    motion:
      algorithm: "MOG2"       # FRAME_DIFF, BACKGROUND_SUB, MOG2, KNN
      sensitivity: 0.5        # 0.0 (low) - 1.0 (high)
      min_area: 500          # Minimum motion area (pixels squared)
      enable_alerts: true     # Motion alerts

  # Output settings
  output:
    type: "display"           # display, file, rtsp
    location: ""              # Output location (for file or rtsp)

    # Encoding settings
    encoding:
      codec: "h264"           # h264, h265, vp8, vp9
      bitrate: 4000000        # Bitrate (bps)
      preset: "medium"        # ultrafast, fast, medium, slow

    # RTSP server settings
    rtsp:
      port: 8554
      mount_point: "/live"
      max_clients: 10
      enable_auth: false
      username: "admin"
      password: "admin"

  # Recording settings
  recording:
    enabled: false
    location: "recordings/output.mp4"
    max_duration: 3600        # Maximum recording duration (seconds)
    split_duration: 300       # File split duration (seconds)

# Performance settings
performance:
  buffer_size: 200            # Buffer size (frames)
  max_latency: 200           # Maximum latency (ms)
  thread_count: 0            # 0 = automatic

# Debug settings
debug:
  verbose: false
  log_level: "INFO"           # DEBUG, INFO, WARNING, ERROR
  save_logs: true
  log_file: "logs/pipeline.log"
