version: "3.9"

services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: edge-dev:x86
    container_name: edge-dev
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility,graphics
      - DISPLAY=${DISPLAY}
    volumes:
      - ..:/work
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev          # USB cameras
    devices:
      - /dev/video0:/dev/video0
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true

  jetson:
    build:
      context: ..
      dockerfile: docker/Dockerfile.l4t
    image: edge:l4t
    container_name: edge-jetson
    runtime: nvidia
    platform: linux/arm64
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ..:/work
      - /tmp/argus_socket:/tmp/argus_socket
      - /etc/nv_tegra_release:/etc/nv_tegra_release:ro
    devices:
      - /dev/video0:/dev/video0
    network_mode: host
    privileged: true
